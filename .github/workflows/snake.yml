# ────────────────────────────────────────────────────────────────
#  Ubica este archivo en:  .github/workflows/snake.yml
#  Genera la animación de la serpiente que "se come" tu grafo de
#  contribuciones y la publica en la rama "output".
# ────────────────────────────────────────────────────────────────
name: Generate Snake Animation

on:
  schedule:
    # Se regenera cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:   # Permite ejecutarlo a mano desde la pestaña Actions
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
